version: '3.8'

services:
  frontend:
    image: ghcr.io/${REPO_OWNER:-ringmaster500}/hytale-manager-frontend:latest
    container_name: hytale-manager-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend

  backend:
    image: ghcr.io/${REPO_OWNER:-ringmaster500}/hytale-manager-backend:latest
    container_name: hytale-manager-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CASAOS_DIR=/DATA/AppData/hytale-manager/instances
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/AppData/hytale-manager/instances:/DATA/AppData/hytale-manager/instances

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hytale-manager-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
