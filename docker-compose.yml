version: '3.8'

services:
  hytale-manager:
    image: ghcr.io/${REPO_OWNER:-ringmaster500}/hytale-manager-frontend:latest
    container_name: hytale-manager-frontend
    restart: unless-stopped
    ports:
      - "4982:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4983
    depends_on:
      - hytale-backend
    x-casaos:
      author: Ringmaster500
      category: Game
      icon: https://hytale.com/static/images/logo.png
      title: Hytale Server Manager
      main: hytale-manager
      port_map: "4982"

  hytale-backend:
    image: ghcr.io/${REPO_OWNER:-ringmaster500}/hytale-manager-backend:latest
    container_name: hytale-manager-backend
    restart: unless-stopped
    ports:
      - "4983:4982"
    environment:
      - PORT=4982
      - CASAOS_DIR=/DATA/AppData/hytale-manager/instances
      - DOCKER_SOCKET=/var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/AppData/hytale-manager/instances:/DATA/AppData/hytale-manager/instances
    x-casaos:
      author: Ringmaster500
      category: Utility
      icon: https://hytale.com/static/images/logo.png
      title: Hytale Manager API
