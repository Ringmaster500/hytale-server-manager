services:
  hytale-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: hytale-manager:latest
    container_name: hytale-manager
    ports:
      - "4982:4982"
    environment:
      - PORT=4982
      - NODE_ENV=production
      - DOCKER_SOCKET=/var/run/docker.sock
      - DATA_DIR=/DATA/AppData/hytale-manager/instances
      - HYTALE_IMAGE=hytale-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /DATA/AppData/hytale-manager:/app/data
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
